appId: com.deus.app
productName: Deus
directories:
  buildResources: resources
  output: dist-electron
electronLanguages: [en]
beforePack: "apps/runtime/electron-builder-before-pack.cjs"
files:
  - "out/**/*"
  - "resources/**/*"
  - "!apps/**/*"
asarUnpack:
  - "resources/**"
  - "node_modules/better-sqlite3/**"
  - "node_modules/node-pty/**"
extraResources:
  - from: "dist/runtime/electron/backend"
    to: "backend"
    filter:
      - "**/*"
  - from: "dist/runtime/electron/bin/index.bundled.cjs"
    to: "bin/index.bundled.cjs"
  - from: "packages/device-use/bin/simbridge"
    to: "simulator/simbridge"
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  darkModeSupport: true
  icon: resources/icons/icon.icns
  notarize: true
win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/icon.png
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  icon: resources/icons/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  releaseType: release
