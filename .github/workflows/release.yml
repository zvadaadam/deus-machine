# Multi-platform release workflow (macOS, Linux)
#
# Builds and publishes the Electron app for all platforms via GitHub Releases.
# electron-updater reads latest-mac.yml / latest.yml / latest-linux.yml from
# the release assets to deliver auto-updates.
#
# Trigger: GitHub Actions UI → "Run workflow" → pick bump type
# Or CLI:  gh workflow run release.yml -f bump=patch
#          gh workflow run release.yml -f bump=minor
#          gh workflow run release.yml -f bump=patch -f dry_run=true
#
# Required GitHub Secrets:
#   APPLE_CERTIFICATE                  — Base64-encoded .p12 Developer ID Application certificate
#   APPLE_CERTIFICATE_PASSWORD         — Password for the .p12 file
#   APPLE_API_KEY                      — App Store Connect API key (.p8 file contents)
#   APPLE_API_KEY_ID                   — Key ID from App Store Connect
#   APPLE_API_ISSUER                   — Issuer ID from App Store Connect
#
# Optional GitHub Secrets:
#   SENTRY_AUTH_TOKEN                  — Sentry auth token for source map upload
#
# Required for CLI publishing:
#   NPM_TOKEN                         — npm access token for publishing deus-machine CLI

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (build only, skip GitHub Release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── Step 1: Validate version & bump files ───────────────────────────
  validate-and-bump:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure release runs from main
        if: ${{ inputs.dry_run == false }}
        run: |
          if [[ "${{ github.ref_name }}" != "main" ]]; then
            echo "::error::Release must be triggered from main branch, got: ${{ github.ref_name }}"
            exit 1
          fi

      - name: Compute next version
        id: validate
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${VERSION}"

          echo "Current: $CURRENT → Next: $VERSION ($BUMP bump)"

          if [[ "${{ inputs.dry_run }}" != "true" ]] && git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists on remote"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Bump version, commit & create tag
        if: ${{ inputs.dry_run == false }}
        run: |
          bash scripts/bump-version.sh "${{ steps.validate.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json apps/cli/package.json
          git commit -m "release: v${{ steps.validate.outputs.version }}"
          git tag "${{ steps.validate.outputs.tag }}"
          git push --atomic origin HEAD "${{ steps.validate.outputs.tag }}"

  # ── Step 2a: Build macOS (arm64 + x64), sign, notarize ─────────────
  build-macos:
    needs: validate-and-bump
    runs-on: macos-14
    timeout-minutes: 45
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run == false && needs.validate-and-bump.outputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all
        run: bun run build:all

      - name: Prepare Apple API key for notarization
        run: |
          if [[ -z "$APPLE_API_KEY" || -z "$APPLE_API_KEY_ID" || -z "$APPLE_API_ISSUER" ]]; then
            echo "::error::APPLE_API_KEY, APPLE_API_KEY_ID, and APPLE_API_ISSUER secrets must be set"
            exit 1
          fi
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s\n' "$APPLE_API_KEY" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Package macOS (arm64 + x64)
        run: bunx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY_PATH }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Notarize macOS distribution artifacts
        run: |
          set -euo pipefail

          # electron-builder's notarize:true only covers the .app bundle.
          # DMG/ZIP wrappers must be submitted separately so Gatekeeper
          # trusts them and `xcrun stapler validate` passes.
          for artifact in dist-electron/*.dmg dist-electron/*.zip; do
            [ -f "$artifact" ] || continue
            echo "Submitting ${artifact} for notarization..."
            xcrun notarytool submit "$artifact" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
          done

          # Staple tickets to DMGs (ZIPs cannot be stapled; Gatekeeper
          # checks online for those)
          for dmg in dist-electron/*.dmg; do
            [ -f "$dmg" ] || continue
            echo "Stapling ticket to ${dmg}..."
            xcrun stapler staple "$dmg"
          done
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Verify macOS artifacts
        run: |
          set -euo pipefail

          found_resources=0
          while IFS= read -r resources_dir; do
            found_resources=1
            echo "Verifying packaged simulator helpers in $resources_dir"
            test -x "$resources_dir/simulator/simbridge"
            test -f "$resources_dir/simulator/siminspector.dylib"
            lipo -verify_arch arm64 x86_64 "$resources_dir/simulator/simbridge"
            lipo -verify_arch arm64 x86_64 "$resources_dir/simulator/siminspector.dylib"
          done < <(find dist-electron -maxdepth 4 -path '*/Deus.app/Contents/Resources' -type d | sort)
          if [[ "$found_resources" -ne 1 ]]; then
            echo "::error::No packaged Deus.app Resources directory found for simulator helper verification"
            exit 1
          fi

          while IFS= read -r app_path; do
            echo "Verifying signature for $app_path"
            codesign --verify --deep --strict --verbose=2 "$app_path"
          done < <(find dist-electron -maxdepth 2 -path '*/Deus.app' -type d | sort)

          while IFS= read -r dmg_path; do
            echo "Validating notarization for $dmg_path"
            xcrun stapler validate "$dmg_path"
          done < <(find dist-electron -maxdepth 1 -name '*.dmg' -type f | sort)

      - name: Smoke test packaged runtime from DMG copy
        run: |
          set -euo pipefail

          runner_arch="$(uname -m)"
          case "$runner_arch" in
            arm64)
              dmg_path="$(find dist-electron -maxdepth 1 -name '*arm64.dmg' -type f | head -n 1)"
              ;;
            x86_64)
              dmg_path="$(find dist-electron -maxdepth 1 \( -name '*x64.dmg' -o ! -name '*arm64.dmg' \) -type f | head -n 1)"
              ;;
            *)
              echo "::error::Unsupported macOS runner architecture: ${runner_arch}"
              exit 1
              ;;
          esac
          if [[ -z "$dmg_path" ]]; then
            echo "::error::No macOS DMG found for runner architecture ${runner_arch}"
            find dist-electron -maxdepth 1 -name '*.dmg' -type f -print
            exit 1
          fi

          mount_dir="$(mktemp -d "${RUNNER_TEMP}/deus-dmg.XXXXXX")"
          copied_root="$(mktemp -d "${RUNNER_TEMP}/deus-app.XXXXXX")"
          copied_app="$copied_root/Deus.app"
          attached=0

          cleanup() {
            if [[ "$attached" -eq 1 ]]; then
              hdiutil detach "$mount_dir" -quiet || true
            fi
          }
          trap cleanup EXIT

          hdiutil attach "$dmg_path" -mountpoint "$mount_dir" -nobrowse
          attached=1
          ditto "$mount_dir/Deus.app" "$copied_app"
          hdiutil detach "$mount_dir" -quiet
          attached=0

          app_bin="$copied_app/Contents/MacOS/Deus"
          resources_dir="$copied_app/Contents/Resources"
          test -x "$resources_dir/simulator/simbridge"
          test -f "$resources_dir/simulator/siminspector.dylib"
          test -x "$app_bin"

          node scripts/runtime/smoke-packaged-runtime.cjs \
            --app "$copied_app" \
            --require-gatekeeper

      - name: Clean up Apple API key
        if: always()
        run: rm -f "${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip
            dist-electron/*.blockmap
            dist-electron/latest-mac.yml
          if-no-files-found: error

  # ── Step 2b: Build Linux (x64) ─────────────────────────────────────
  build-linux:
    needs: validate-and-bump
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run == false && needs.validate-and-bump.outputs.tag || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all
        run: bun run build:all

      - name: Package Linux (x64)
        run: bunx electron-builder --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.blockmap
            dist-electron/latest-linux.yml
          if-no-files-found: error

  # ── Step 3: Stage a draft GitHub Release with all artifacts ─────────
  create-release:
    needs: [validate-and-bump, build-macos, build-linux]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.dmg" -o -name "*.zip" -o \
            -name "*.AppImage" -o -name "*.deb" -o \
            -name "*.blockmap" -o -name "*.yml" \
          \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate-and-bump.outputs.tag }}
          VERSION: ${{ needs.validate-and-bump.outputs.version }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Deus v${VERSION}" \
            --draft \
            --generate-notes \
            release/*

  # ── Step 4: Publish CLI to npm before the release becomes public ────
  publish-cli:
    needs: [validate-and-bump, create-release]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not configured. Cannot publish CLI."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-and-bump.outputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: |
          bun run build:runtime
          cd apps/cli && bun run build

      - name: Publish to npm
        working-directory: apps/cli
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Step 5: Publish GitHub Release after CLI publish succeeds ───────
  publish-release:
    needs: [validate-and-bump, publish-cli]
    if: ${{ inputs.dry_run == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate-and-bump.outputs.tag }}
        run: |
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --draft=false
