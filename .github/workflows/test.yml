name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        # TODO: eslint-plugin-react-hooks v7 added React Compiler rules that
        # report 19 false positives as errors (refs-in-render, setState-in-effect).
        # These cannot be downgraded to warnings in v7. Once the component patterns
        # are updated or we pin to v5, remove "|| true" to make lint blocking.
        run: bun run lint || true

      - name: Dead code check (Knip)
        # Non-blocking while we clean up existing unused files/exports.
        # Once resolved, remove "|| true" and use --max-issues 0 to enforce.
        run: bun run knip || true

      - name: Format check (Prettier)
        run: bun run format:check

      - name: Typecheck (frontend + desktop)
        run: bun run typecheck

      - name: Typecheck (backend)
        run: bun run typecheck:backend

      - name: Typecheck (agent-server)
        run: bun run typecheck:agent-server

      - name: Typecheck & test (cloud-relay)
        run: cd apps/cloud-relay && bun install --frozen-lockfile && bunx tsc --noEmit && bunx vitest run

  runtime-macos:
    name: Native Runtime Smoke (macOS)
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build staged native runtime
        run: bun run build:runtime

      - name: Validate staged runtime
        run: bun run validate:runtime

      - name: Smoke source runtime contract
        run: bun run smoke:runtime-source

      - name: Smoke desktop main runtime contract
        run: bun run smoke:desktop-main-runtime

      - name: Smoke native runtime executable
        run: bun run smoke:runtime-native -- --skip-validate

      - name: Smoke packaged runtime resources
        run: bun run smoke:runtime-resources

      - name: Build Electron desktop outputs
        run: |
          bun run build:pencil
          bun run build

      - name: Select macOS package architecture
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            arm64)
              echo "MAC_BUILDER_ARCH=arm64" >> "$GITHUB_ENV"
              echo "MAC_EXPECTED_ARCH=arm64" >> "$GITHUB_ENV"
              echo "MAC_APP_PATH=dist-electron/mac-arm64/Deus.app" >> "$GITHUB_ENV"
              ;;
            x86_64)
              echo "MAC_BUILDER_ARCH=x64" >> "$GITHUB_ENV"
              echo "MAC_EXPECTED_ARCH=x64" >> "$GITHUB_ENV"
              echo "MAC_APP_PATH=dist-electron/mac/Deus.app" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported macOS runner architecture: $(uname -m)"
              exit 1
              ;;
          esac

      - name: Package macOS app directory
        run: bun run package:mac:dir -- --arch "$MAC_BUILDER_ARCH"
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Smoke packaged macOS app bundle
        run: >
          node scripts/runtime/smoke-packaged-app.cjs
          --app "$MAC_APP_PATH"
          --arch "$MAC_EXPECTED_ARCH"
          --skip-app-signature
          --run-version-checks

      - name: Smoke packaged runtime executable
        run: >
          node scripts/runtime/smoke-packaged-runtime.cjs
          --app "$MAC_APP_PATH"
          --skip-app-check

      - name: Smoke packaged Electron desktop
        run: >
          node scripts/runtime/smoke-packaged-desktop.cjs
          --app "$MAC_APP_PATH"
          --skip-app-check

  desktop-runtime-tests:
    name: Desktop Runtime Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run desktop/runtime unit tests
        run: bun run test:desktop-runtime

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild better-sqlite3 for Node.js
        # bun install compiles native modules for Bun's ABI, but vitest runs
        # under Node.js which has a different NODE_MODULE_VERSION. Rebuild
        # better-sqlite3 specifically for the Node.js version used in CI.
        run: cd node_modules/better-sqlite3 && bunx node-gyp rebuild

      - name: Run tests
        run: bun run test:backend

  agent-server-tests:
    name: Agent Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run agent-server unit tests
        run: bun run test:agent-server:unit

      - name: Build agent-server bundle
        run: bun run build:agent-server

      - name: Run agent-server E2E tests
        run: bun run test:agent-server:e2e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
