<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <!-- Inter font experiment -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Command</title>

    <!-- Apply theme before first render to prevent flash -->
    <script>
      (function () {
        try {
          const stored = localStorage.getItem("theme");
          let theme = "system";

          if (stored === "light" || stored === "dark" || stored === "system") {
            theme = stored;
          }

          let resolved;
          if (theme === "system") {
            resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          } else {
            resolved = theme;
          }

          document.documentElement.classList.add(resolved);

          // Detect Tauri environment and add class for desktop-specific styles
          // Check immediately and also after a short delay (Tauri APIs may not be ready yet)
          function detectTauri() {
            if (window.__TAURI__ || window.__TAURI_INTERNALS__) {
              document.documentElement.classList.add("tauri");
              return true;
            }
            return false;
          }

          if (!detectTauri()) {
            // Retry after DOM is ready (Tauri injects APIs after initial script execution)
            setTimeout(detectTauri, 0);
            document.addEventListener("DOMContentLoaded", detectTauri);
          }
        } catch (e) {
          // Fallback to light mode on error
          document.documentElement.classList.add("light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
