<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Automation Test Page</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: 500;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 0;
        }
        button:hover {
            background: #0056b3;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        #output {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            min-height: 100px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Browser Automation Test Page</h1>
        <p>This page verifies that the dev-browser automation script is working correctly.</p>

        <div class="status info" id="automation-status">
            ⏳ Checking automation status...
        </div>

        <h2>Test Controls</h2>
        <p>Use these controls to test if AI can interact with the page:</p>

        <button id="test-button" onclick="handleButtonClick()">Click Me!</button>
        <input type="text" id="test-input" placeholder="Type something here...">

        <h2>Activity Log</h2>
        <div id="output"></div>
    </div>

    <script>
        function log(message) {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            output.innerHTML += `[${timestamp}] ${message}<br>`;
        }

        function handleButtonClick() {
            log('✅ Button was clicked!');
            alert('Button clicked successfully!');
        }

        // Check if automation is loaded
        setTimeout(() => {
            const statusDiv = document.getElementById('automation-status');
            if (window.__browserAutomation) {
                statusDiv.className = 'status success';
                statusDiv.innerHTML = '✅ <strong>Automation Active!</strong> AI can control this page.';
                log('🎉 Browser automation script detected and initialized');
                log('📡 MCP Server port: ' + window.__browserAutomation?.config?.mcpServerPort);
                log('🏷️  Tab ID: ' + window.__browserAutomation?.config?.tabId);
            } else {
                statusDiv.className = 'status info';
                statusDiv.innerHTML = '⚠️ <strong>Automation Not Detected</strong><br>Make sure to inject the automation script from the browser panel.';
                log('❌ No automation script detected');
            }
        }, 1000);

        // Log page load
        log('📄 Page loaded successfully');
    </script>
</body>
</html>
