<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Test Page</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        h1 {
            margin-top: 0;
            font-size: 3em;
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        #counter {
            font-size: 4em;
            font-weight: bold;
            margin: 30px 0;
        }
        .status {
            background: rgba(0, 255, 0, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎉 Browser Test Page</h1>
        <p>If you can see this, the iframe is working!</p>

        <div id="counter">0</div>

        <button onclick="increment()">Click Me!</button>
        <button onclick="reset()">Reset</button>

        <div class="status">
            <h3>✅ Status Check:</h3>
            <p>✅ Iframe loading: <strong>SUCCESS</strong></p>
            <p>✅ JavaScript working: <strong>SUCCESS</strong></p>
            <p id="automation-status">⏳ Automation injection: <strong>Checking...</strong></p>
        </div>
    </div>

    <script>
        let count = 0;

        function increment() {
            count++;
            document.getElementById('counter').textContent = count;
        }

        function reset() {
            count = 0;
            document.getElementById('counter').textContent = count;
        }

        // Check if automation is injected
        setTimeout(() => {
            const status = document.getElementById('automation-status');
            if (window.__cursorBrowserAutomationInjected || window.__browserAutomation) {
                status.innerHTML = '⚡ Automation injection: <strong style="color: #00ff00">ACTIVE</strong>';
            } else {
                status.innerHTML = '⏳ Automation injection: <strong>Pending...</strong>';
            }
        }, 1000);

        console.log('✅ Test page loaded successfully!');
        console.log('📍 URL:', window.location.href);
        console.log('🔍 Checking for automation...');
    </script>
</body>
</html>
