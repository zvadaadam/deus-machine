name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Lint, Format & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        # TODO: eslint-plugin-react-hooks v7 added React Compiler rules that
        # report 19 false positives as errors (refs-in-render, setState-in-effect).
        # These cannot be downgraded to warnings in v7. Once the component patterns
        # are updated or we pin to v5, remove "|| true" to make lint blocking.
        run: bun run lint || true

      - name: Dead code check (Knip)
        # Non-blocking while we clean up existing unused files/exports.
        # Once resolved, remove "|| true" and use --max-issues 0 to enforce.
        run: bun run knip || true

      - name: Format check (Prettier)
        run: bun run format:check

      - name: Typecheck (frontend + desktop)
        run: bun run typecheck

      - name: Typecheck (backend)
        run: bun run typecheck:backend

      - name: Typecheck & test (cloud-relay)
        run: cd apps/cloud-relay && bun install --frozen-lockfile && bunx tsc --noEmit && bunx vitest run

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild better-sqlite3 for Node.js
        # bun install compiles native modules for Bun's ABI, but vitest runs
        # under Node.js which has a different NODE_MODULE_VERSION. Rebuild
        # better-sqlite3 specifically for the Node.js version used in CI.
        run: cd node_modules/better-sqlite3 && bunx node-gyp rebuild

      - name: Run tests
        run: bun run test:backend

  agent-server-tests:
    name: Agent Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run agent-server unit tests
        run: bun run test:agent-server:unit

      - name: Build agent-server bundle
        run: bun run build:agent-server

      - name: Run agent-server E2E tests
        run: bun run test:agent-server:e2e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
