appId: com.deus.app
productName: Deus
directories:
  buildResources: resources
  output: dist-electron
electronLanguages: [en]
npmRebuild: false
beforePack: "scripts/runtime/electron-builder-before-pack.cjs"
afterPack: "scripts/prune-pencil-cli-binaries.cjs"
afterSign: "scripts/verify-packaged-agent-clis.cjs"
files:
  - "out/**/*"
  - "resources/**/*"
  - "!apps/**/*"
  - "!node_modules/device-use/native/.build/**"
  - "!node_modules/device-use/native/.swiftpm/**"
asarUnpack:
  - "resources/**"
  - "node_modules/better-sqlite3/**"
  - "node_modules/node-pty/**"
  - "node_modules/@napi-rs/canvas/**"
  - "node_modules/@napi-rs/canvas-*/**"
  - "node_modules/@pencil.dev/cli/dist/out/**"
extraResources:
  - from: "packages/pencil"
    to: "agentic-apps/pencil"
    filter:
      - "agentic-app.json"
      - "package.json"
      - "dist/**/*"
      - "skills/**/*"
  - from: "node_modules/@pencil.dev/cli"
    to: "agentic-apps/pencil/node_modules/@pencil.dev/cli"
    filter:
      - "package.json"
      - "dist/**/*"
      - "SKILL.md"
mac:
  category: public.app-category.developer-tools
  binaries:
    - "Contents/Resources/bin/deus-runtime"
    - "Contents/Resources/bin/codex"
    - "Contents/Resources/bin/claude"
    - "Contents/Resources/bin/gh"
    - "Contents/Resources/bin/rg"
  extraResources:
    - from: "dist/runtime/electron/bin/deus-runtime.json"
      to: "bin/deus-runtime.json"
    - from: "dist/runtime/electron/bin/agent-clis.json"
      to: "bin/agent-clis.json"
    - from: "dist/runtime/electron/bin/gh-cli.json"
      to: "bin/gh-cli.json"
    - from: "dist/runtime/electron/bin/darwin-${arch}/gh"
      to: "bin/gh"
    - from: "dist/runtime/electron/bin/darwin-${arch}/deus-runtime"
      to: "bin/deus-runtime"
    - from: "dist/runtime/electron/bin/darwin-${arch}/codex"
      to: "bin/codex"
    - from: "dist/runtime/electron/bin/darwin-${arch}/claude"
      to: "bin/claude"
    - from: "dist/runtime/electron/bin/darwin-${arch}/rg"
      to: "bin/rg"
    - from: "packages/device-use/bin/simbridge"
      to: "simulator/simbridge"
    - from: "packages/device-use/bin/siminspector.dylib"
      to: "simulator/siminspector.dylib"
    - from: "packages/device-use"
      to: "agentic-apps/device-use"
      filter:
        - "agentic-app.json"
        - "package.json"
        - "dist/**/*"
        - "skills/**/*"
        - "bin/**/*"
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  additionalArguments:
    - "--pagesize"
    - "4096"
  darkModeSupport: true
  icon: resources/icons/icon.icns
  notarize: true
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
  icon: resources/icons/icon.png
publish:
  provider: github
  releaseType: release
