<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Selector Test - Iframe Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #controls {
            background: #2a2a2a;
            padding: 20px;
            border-bottom: 1px solid #3a3a3a;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        #controls h1 {
            font-size: 18px;
            margin-right: auto;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button.primary {
            background: #0066cc;
            color: white;
        }

        button.primary:hover {
            background: #0052a3;
        }

        button.secondary {
            background: #6c757d;
            color: white;
        }

        button.secondary:hover {
            background: #5a6268;
        }

        button.success {
            background: #28a745;
            color: white;
        }

        button.primary.active {
            background: #28a745;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        #iframe-container {
            flex: 1;
            position: relative;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #status {
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
        }

        #status.active {
            background: #d1ecf1;
            color: #0c5460;
        }

        #status.inactive {
            background: #f8d7da;
            color: #721c24;
        }

        #output {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            max-height: 400px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            z-index: 10000;
        }

        .log-entry {
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3a3a3a;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-timestamp {
            color: #888;
            font-size: 11px;
        }

        .log-message {
            color: #fff;
            margin: 5px 0;
        }

        .log-data {
            background: #1a1a1a;
            padding: 8px;
            border-radius: 4px;
            margin-top: 5px;
            color: #4CAF50;
            font-size: 11px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div id="controls">
        <h1>🎯 Element Selector Test</h1>
        <div id="status" class="inactive">Inactive</div>
        <button id="btn-activate" class="primary" onclick="activateSelector()">Activate Selector</button>
        <button class="secondary" onclick="deactivateSelector()">Deactivate</button>
        <button class="success" onclick="clearOutput()">Clear Log</button>
    </div>

    <div id="iframe-container">
        <iframe id="test-iframe" src="test-element-selector.html" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <div id="output"></div>

    <script>
        let selectorActive = false;
        const iframe = document.getElementById('test-iframe');
        const statusEl = document.getElementById('status');
        const activateBtn = document.getElementById('btn-activate');

        // Listen for messages from the iframe
        window.addEventListener('message', (event) => {
            // For testing, we'll accept messages from file:// origin
            if (event.source !== iframe.contentWindow) {
                return;
            }

            logOutput('📨 Received message from iframe:', event.data);

            if (event.data.type === 'element-selected') {
                logOutput('✅ Element selected!', event.data);
                deactivateSelector();
            } else if (event.data.type === 'exit-selection-mode') {
                logOutput('🚪 User exited selection mode (Escape pressed)');
                deactivateSelector();
            } else if (event.data.type === 'area-screenshot') {
                logOutput('📸 Area screenshot captured!', event.data);
                deactivateSelector();
            }
        });

        function activateSelector() {
            if (selectorActive) return;

            selectorActive = true;
            statusEl.className = 'active';
            statusEl.textContent = 'Active - Click any element in iframe';
            activateBtn.classList.add('active');

            logOutput('🎯 Activating element selector...');

            // Send activation message to iframe
            const message = { type: 'enable-element-selection' };
            iframe.contentWindow.postMessage(message, '*');

            logOutput('📤 Sent activation message to iframe', message);
        }

        function deactivateSelector() {
            if (!selectorActive) return;

            selectorActive = false;
            statusEl.className = 'inactive';
            statusEl.textContent = 'Inactive';
            activateBtn.classList.remove('active');

            logOutput('⏹️ Deactivating element selector...');

            // Send deactivation message to iframe
            const message = { type: 'disable-element-selection' };
            iframe.contentWindow.postMessage(message, '*');

            logOutput('📤 Sent deactivation message to iframe', message);
        }

        function logOutput(message, data = null) {
            const output = document.getElementById('output');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const timestamp = document.createElement('div');
            timestamp.className = 'log-timestamp';
            timestamp.textContent = new Date().toLocaleTimeString();

            const messageEl = document.createElement('div');
            messageEl.className = 'log-message';
            messageEl.textContent = message;

            entry.appendChild(timestamp);
            entry.appendChild(messageEl);

            if (data) {
                const dataEl = document.createElement('div');
                dataEl.className = 'log-data';
                dataEl.textContent = JSON.stringify(data, null, 2);
                entry.appendChild(dataEl);
            }

            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            logOutput('🧹 Output cleared');
        }

        // Wait for iframe to load before allowing activation
        iframe.addEventListener('load', () => {
            logOutput('✅ Test page loaded in iframe');
            logOutput('💡 Click "Activate Selector" to begin testing');
        });

        logOutput('📄 Parent page loaded');
    </script>
</body>
</html>
