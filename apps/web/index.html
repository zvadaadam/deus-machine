<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#000000" />
    <title>Deus</title>

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:title" content="Deus" />
    <meta
      property="og:description"
      content="Agentic engineering platform for managing multiple parallel coding agents"
    />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />

    <!-- Apply theme before first render to prevent flash -->
    <script>
      (function () {
        try {
          const stored = localStorage.getItem("theme");
          let theme = "system";

          if (stored === "light" || stored === "dark" || stored === "system") {
            theme = stored;
          }

          let resolved;
          if (theme === "system") {
            resolved = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          } else {
            resolved = theme;
          }

          document.documentElement.classList.add(resolved);

          // Detect Electron environment and add class for desktop-specific styles
          if (window.electronAPI) {
            document.documentElement.classList.add("electron");
          }
        } catch (e) {
          // Fallback to light mode on error
          document.documentElement.classList.add("light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/app/main.tsx"></script>
  </body>
</html>
