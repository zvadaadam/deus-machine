name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Rebuild better-sqlite3 for Node.js
        # bun install compiles native modules for Bun's ABI, but vitest runs
        # under Node.js which has a different NODE_MODULE_VERSION. Rebuild
        # better-sqlite3 specifically for the Node.js version used in CI.
        run: cd node_modules/better-sqlite3 && bunx node-gyp rebuild

      - name: Run tests
        run: bun run test:backend

  sidecar-tests:
    name: Sidecar Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.19

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build inject scripts
        run: bun run build:inject

      - name: Run sidecar unit tests
        run: bun run test:sidecar:unit

      - name: Build sidecar bundle
        run: bun run build:sidecar

      - name: Run sidecar E2E tests
        run: bun run test:sidecar:e2e
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
