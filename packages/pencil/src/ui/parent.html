<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Pencil</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot" id="dot" data-state=""></span>
        <span class="brand-name">Pencil</span>
        <span class="brand-version" id="version" hidden></span>
      </div>
      <span class="topbar-status" id="status">connecting…</span>
      <div class="switcher" id="switcher">
        <button
          type="button"
          id="switcher-trigger"
          class="switcher-trigger is-empty"
          aria-haspopup="listbox"
          aria-expanded="false"
        >
          <span class="switcher-dot" id="switcher-dot" aria-hidden="true"></span>
          <span class="switcher-name-empty" id="switcher-label">no design</span>
          <svg class="switcher-chevron" viewBox="0 0 10 10" fill="none" aria-hidden="true">
            <path
              d="M2 4l3 3 3-3"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <div class="switcher-menu" id="switcher-menu" role="listbox" hidden></div>
      </div>
      <span class="topbar-spacer"></span>
      <span class="topbar-running" id="running" hidden>
        <span class="dot dot--run"></span>
        <span id="run-label">working</span>
        <span class="elapsed" id="run-elapsed"></span>
        <button class="btn btn--danger" id="cancel">Cancel</button>
      </span>
      <span class="topbar-auth" id="auth"></span>
    </header>

    <iframe
      id="editor"
      class="editor-frame"
      src="/editor/"
      title="Pencil editor"
      allow="clipboard-read; clipboard-write"
    ></iframe>

    <div id="signin-overlay" class="signin-overlay" hidden>
      <div class="signin-card">
        <h1>Sign in to Pencil</h1>
        <p>
          Paste a CLI key from your
          <a href="https://www.pencil.dev" target="_blank" rel="noopener"
            >Pencil developer settings</a
          >. Verified against the Pencil API and stored locally in
          <code>~/.deus/pencil/cli-key</code>; never sent anywhere else.
        </p>
        <form id="signin-form" class="signin-form">
          <input
            id="signin-key"
            type="password"
            placeholder="pencil_cli_..."
            autocomplete="off"
            spellcheck="false"
          />
          <button id="signin-button" type="submit" class="btn btn--primary">Verify</button>
        </form>
        <div id="signin-error" class="signin-error"></div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
